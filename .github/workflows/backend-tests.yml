name: Backend Tests

on:
  push:
    branches: [main, develop]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-tests.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'backend/**'

env:
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/algochanakya_test
  REDIS_URL: redis://localhost:6379
  SECRET_KEY: test-secret-key-for-ci
  JWT_SECRET: test-jwt-secret-for-ci
  KITE_API_KEY: test-kite-api-key
  KITE_API_SECRET: test-kite-api-secret
  KITE_REDIRECT_URL: http://localhost:8001/api/auth/zerodha/callback
  FRONTEND_URL: http://localhost:3000
  ANTHROPIC_API_KEY: test-anthropic-api-key

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: algochanakya_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Validate folder structure
        run: |
          python .github/scripts/validate-structure.py

      - name: Validate cross-layer imports
        run: |
          python .github/scripts/validate-cross-imports.py

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov allure-pytest httpx

      - name: Run database migrations
        working-directory: backend
        run: |
          alembic upgrade head

      - name: Run tests with coverage
        working-directory: backend
        run: |
          pytest tests/ \
            -v \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=html:coverage-report \
            --alluredir=allure-results \
            --junitxml=test-results/junit.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: backend/coverage.xml
          flags: backend
          name: backend-coverage

      - name: Upload Allure results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-allure-results
          path: backend/allure-results/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/test-results/

  allure-report:
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download Allure results
        uses: actions/download-artifact@v4
        with:
          name: backend-allure-results
          path: allure-results

      - name: Generate Allure Report
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-history
          destination_dir: backend-tests
