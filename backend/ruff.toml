# Ruff configuration for AlgoChanakya backend
target-version = "py313"
line-length = 120

[lint]
# Enable these rule sets
select = [
  "E",     # pycodestyle errors
  "W",     # pycodestyle warnings
  "F",     # pyflakes
  "I",     # isort (import ordering)
  "N",     # pep8-naming
  "UP",    # pyupgrade
  "B",     # flake8-bugbear
  "A",     # flake8-builtins
  "ASYNC", # flake8-async
  "S",     # flake8-bandit (security)
  "T20",   # flake8-print
  "RET",   # flake8-return
  "SIM",   # flake8-simplify
  "TCH",   # flake8-type-checking
  "ERA",   # eradicate (commented-out code)
  "RUF",   # ruff-specific rules
]

ignore = [
  "E501",    # line too long (handled by formatter)
  "S101",    # assert usage (needed in tests)
  "S105",    # possible hardcoded password (false positives with test fixtures)
  "S106",    # possible hardcoded password (false positives with test fixtures)
  "B008",    # function call in default argument (FastAPI Depends pattern)
  "RET504",  # unnecessary assignment before return (readability preference)
  "T201",    # print statements (used in scripts and debugging)
  "ERA001",  # commented-out code (too aggressive)
  "UP007",   # use X | Y for union types (keep Optional for clarity)
  "N805",    # first argument should be self (conflicts with Pydantic validators)
]

# Per-file ignores
[lint.per-file-ignores]
"tests/**/*.py" = ["S", "B011", "N802"]  # Relax security + naming rules in tests
"alembic/**/*.py" = ["E", "F", "I"]       # Auto-generated migration files
"app/constants/**/*.py" = ["E501"]         # Constants can have long lines

[lint.isort]
known-first-party = ["app"]
combine-as-imports = true

[format]
quote-style = "double"
indent-style = "space"
docstring-code-format = true
